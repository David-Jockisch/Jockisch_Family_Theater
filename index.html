<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jockisch Family Theater</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">

</head>

<body>

<div id="app">

    <!-- ===================================================== -->
    <!-- SCENE 1 - INTRO -->
    <!-- ===================================================== -->

    <section id="scene1" class="scene active">

        <div id="logoScene">

            <img class="logo-layer glow"
                src="assets/logos/logo-cross-glow.png"
                alt="">

            <img class="logo-layer cross"
                src="assets/logos/logo-cross.png"
                alt="">

            <img class="logo-layer ring"
                src="assets/logos/logo-ring.png"
                alt="">

            <img class="logo-layer j"
                src="assets/logos/logo-j.png"
                alt="">

            <img class="logo-layer jockisch"
                src="assets/logos/logo-jockisch.png"
                alt="">

            <img class="logo-layer family"
                src="assets/logos/logo-family.png"
                alt="">

            <img class="logo-layer private"
                src="assets/logos/logo-private.png"
                alt="">

        </div>

    </section>


    <!-- ===================================================== -->
    <!-- SCENE 2 -->
    <!-- ===================================================== -->

    <section id="scene2" class="scene">

        <div class="movie-container">

            <img
                class="poster"
                src="assets/posters/ironman.jpg"
                alt="Movie Poster">

            <div class="movie-info">

                <div class="now-playing">
                    NOW PLAYING
                </div>

                <h1>Iron Man</h1>

                <p>
                    PG-13 • 2H 6M • 2008
                </p>

            </div>

        </div>

    </section>

</div>

<script src="js/script.js"></script>

</body>

</html>
