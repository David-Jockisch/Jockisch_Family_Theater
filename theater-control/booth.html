<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Jockisch Family Theater - Projection Booth</title>

    <!-- Styles -->
    <link rel="stylesheet" href="booth.css" />

    <!-- Progressive Web App -->
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#070707">

    <!-- Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="JFT Booth">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="icons/jft-icon-192.png">
    <link rel="icon" type="image/png" href="icons/jft-icon-192.png">
</head>

<body>

<div id="app">

    <header class="booth-header">
        <div class="eyebrow">Jockisch Family Theater</div>
        <h1>Select a Movie</h1>
    </header>

    <!-- ========================= -->
    <!-- PAGE 1 - LIBRARY -->
    <!-- ========================= -->

    <section id="libraryView" class="view active">
        <div id="movieRows"></div>
    </section>

    <!-- ========================= -->
    <!-- PAGE 2 - MOVIE DETAILS -->
    <!-- ========================= -->

    <section id="detailView" class="view">
        <div id="movieDetail"></div>
    </section>

    <!-- ========================= -->
    <!-- PAGE 3 - PRESENTATION BUILDER -->
    <!-- ========================= -->

    <section id="builderView" class="view">
        <div id="presentationBuilder"></div>
    </section>

    <!-- ========================= -->
    <!-- PAGE 4 - PRESENTATION READY -->
    <!-- ========================= -->

    <section id="readyView" class="view">
        <div id="presentationReady"></div>
    </section>

</div>

<!-- Shared Data -->
<script src="../js/movie-library.js"></script>
<script src="../js/demo-library.js"></script>

<!-- Projection Booth -->
<script src="booth.js"></script>

</body>
</html>
